<svg class="eddie-svg eddie-devil" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .eddie-devil { animation: devil-shake 0.3s ease-in-out infinite; }
    @keyframes devil-shake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-3deg); }
      75% { transform: rotate(3deg); }
    }
    .devil-horn { animation: horn-pulse 1s ease-in-out infinite alternate; }
    @keyframes horn-pulse {
      0% { opacity: 0.8; }
      100% { opacity: 1; filter: drop-shadow(0 0 4px #ff4444); }
    }
    .bark-lines { animation: bark-flash 0.4s ease-in-out infinite alternate; }
    @keyframes bark-flash {
      0% { opacity: 0.3; transform: translateX(0); }
      100% { opacity: 1; transform: translateX(5px); }
    }
    .devil-glow { animation: glow-pulse 1.5s ease-in-out infinite alternate; }
    @keyframes glow-pulse {
      0% { stop-color: #ff6b6b; }
      100% { stop-color: #ff2222; }
    }
  </style>
  <defs>
    <radialGradient id="devil-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" class="devil-glow" stop-color="#ff6b6b" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ff6b6b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background glow -->
  <circle cx="100" cy="110" r="80" fill="url(#devil-bg)"/>

  <!-- Body -->
  <ellipse cx="100" cy="140" rx="45" ry="35" fill="#c8a45c" stroke="#8b7332" stroke-width="1.5"/>

  <!-- Head -->
  <circle cx="100" cy="90" r="35" fill="#d4b06a" stroke="#8b7332" stroke-width="1.5"/>

  <!-- Ears (perked up alert) -->
  <path d="M72 70 L60 40 L80 65" fill="#c8a45c" stroke="#8b7332" stroke-width="1.5"/>
  <path d="M128 70 L140 40 L120 65" fill="#c8a45c" stroke="#8b7332" stroke-width="1.5"/>

  <!-- Devil horns -->
  <path class="devil-horn" d="M68 58 L52 20 L72 50" fill="#cc0000" stroke="#990000" stroke-width="1"/>
  <path class="devil-horn" d="M132 58 L148 20 L128 50" fill="#cc0000" stroke="#990000" stroke-width="1"/>

  <!-- Eyes (mischievous) -->
  <ellipse cx="87" cy="85" rx="5" ry="6" fill="#333"/>
  <ellipse cx="113" cy="85" rx="5" ry="6" fill="#333"/>
  <circle cx="89" cy="83" r="1.5" fill="white"/>
  <circle cx="115" cy="83" r="1.5" fill="white"/>

  <!-- Eyebrows (angry/determined) -->
  <line x1="78" y1="76" x2="92" y2="79" stroke="#5a4020" stroke-width="2" stroke-linecap="round"/>
  <line x1="108" y1="79" x2="122" y2="76" stroke="#5a4020" stroke-width="2" stroke-linecap="round"/>

  <!-- Open mouth (barking!) -->
  <ellipse cx="100" cy="102" rx="12" ry="8" fill="#cc3333"/>
  <path d="M88 100 Q100 96 112 100" fill="none" stroke="#333" stroke-width="1.5"/>
  <path d="M92 104 Q100 110 108 104" fill="none" stroke="#333" stroke-width="1.5"/>
  <!-- Tongue -->
  <ellipse cx="100" cy="108" rx="5" ry="4" fill="#ff6666"/>

  <!-- Nose -->
  <ellipse cx="100" cy="95" rx="4" ry="3" fill="#333"/>

  <!-- Bark lines -->
  <g class="bark-lines">
    <line x1="145" y1="80" x2="160" y2="75" stroke="#cc0000" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="148" y1="90" x2="165" y2="90" stroke="#cc0000" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="145" y1="100" x2="160" y2="105" stroke="#cc0000" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Tail (wagging aggressively) -->
  <path d="M145 135 Q165 110 155 95" fill="none" stroke="#c8a45c" stroke-width="5" stroke-linecap="round">
    <animateTransform attributeName="transform" type="rotate" values="-10 145 135;10 145 135;-10 145 135" dur="0.2s" repeatCount="indefinite"/>
  </path>

  <!-- Front legs -->
  <rect x="80" y="165" width="8" height="20" rx="4" fill="#c8a45c" stroke="#8b7332" stroke-width="1"/>
  <rect x="112" y="165" width="8" height="20" rx="4" fill="#c8a45c" stroke="#8b7332" stroke-width="1"/>
</svg>
