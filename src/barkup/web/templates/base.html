<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Eddie Is A Good Boy{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-brand">
            {% if mood == "devil" %}
                <img src="{{ url_for('static', filename='eddie_logo_devil_t.png') }}" alt="" class="nav-logo">
                <span>eddie is <span class="not-stamp">NOT</span> a good boy .com</span>
            {% else %}
                <img src="{{ url_for('static', filename='eddie_logo_angel_t.png') }}" alt="" class="nav-logo">
                <span>eddieisagoodboy.com</span>
            {% endif %}
        </a>
        <div class="nav-links">
            {% if session.get('logged_in') %}
                <a href="{{ url_for('dashboard') }}">Dashboard</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}">Login</a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Powered by YAMNet AI &middot; Tracking Eddie since 2025</p>
    </footer>
</body>
</html>
