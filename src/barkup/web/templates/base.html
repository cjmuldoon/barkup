<!DOCTYPE html>
<html lang="en" data-mood="{{ mood }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Eddie Is A Good Boy{% endblock %}</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <a href="{{ url_for('index') }}" class="nav-brand">
            <span class="nav-logo-wrap">
                <img src="{{ url_for('static', filename='eddie_logo_angel_t.png') }}" alt="" class="nav-logo nav-logo-good">
                <img src="{{ url_for('static', filename='eddie_logo_devil_t.png') }}" alt="" class="nav-logo nav-logo-bad">
            </span>
            <span class="nav-title-wrap">
                <span class="nav-title-good">eddieisagoodboy.com</span>
                <span class="nav-title-bad">eddie is <span class="not-stamp">NOT</span> a good boy .com</span>
            </span>
        </a>
        <div class="nav-links">
            <a href="{{ url_for('about') }}" class="nav-icon" title="About Eddie">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="8" cy="8" r="7"/><line x1="8" y1="7" x2="8" y2="11"/><circle cx="8" cy="4.5" r="0.5" fill="currentColor" stroke="none"/>
                </svg>
            </a>
            <a href="/" class="nav-refresh" onclick="event.preventDefault(); location.reload();" title="Refresh">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 1v5h5"/>
                    <path d="M3.5 10A5.5 5.5 0 1 0 2.8 5.5L1 6"/>
                </svg>
            </a>
            {% if session.get('logged_in') %}
                <a href="{{ url_for('dashboard') }}" class="nav-icon" title="Dashboard">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="1" y="1" width="6" height="7" rx="1"/><rect x="9" y="1" width="6" height="4" rx="1"/><rect x="1" y="10" width="6" height="5" rx="1"/><rect x="9" y="7" width="6" height="8" rx="1"/>
                    </svg>
                </a>
                <a href="{{ url_for('logout') }}" class="nav-icon" title="Logout">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 14H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h3"/><path d="M10 11l3-3-3-3"/><path d="M13 8H6"/>
                    </svg>
                </a>
            {% else %}
                <a href="{{ url_for('login') }}" class="nav-icon" title="Login">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="8" cy="5" r="3"/><path d="M2 14c0-3.3 2.7-5 6-5s6 1.7 6 5"/>
                    </svg>
                </a>
            {% endif %}
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>Powered by YAMNet AI &middot; Tracking Eddie since 2026</p>
    </footer>
</body>
</html>
